<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIF Fullscreen</title>
    <style>
      :root {
        --instagram-size: 36px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        overflow: hidden;
      }

      main {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #hero-gif {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      body.limited #hero-gif {
        object-fit: contain;
        max-width: 100%;
        max-height: 100%;
      }

      #instagram-link {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        color: #111;
        line-height: 0;
      }

      #instagram-link svg {
        width: var(--instagram-size);
        height: var(--instagram-size);
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Placeholder: trocar a URL abaixo pelo GIF final -->
      <img
        id="hero-gif"
        src="https://via.placeholder.com/1920x1080.gif?text=Seu+GIF"
        alt="GIF principal"
      />
    </main>

    <!-- Placeholder: trocar "seu_perfil" pelo @ da conta oficial -->
    <a id="instagram-link" href="https://instagram.com/seu_perfil" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5a4.25 4.25 0 0 0 4.25 4.25h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5Zm8.88 1.38a1.12 1.12 0 1 1 0 2.24 1.12 1.12 0 0 1 0-2.24ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z" />
      </svg>
    </a>

    <script>
      function updateMode() {
        const lowResolution =
          window.innerWidth < 1024 ||
          window.innerHeight < 700;

        document.body.classList.toggle('limited', lowResolution);
      }

      window.addEventListener('resize', updateMode);
      updateMode();
    </script>
  </body>
</html>
